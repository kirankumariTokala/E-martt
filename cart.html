<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; margin:20px; }
        .cart-item { border:1px solid #ccc; padding:10px; margin-bottom:10px; display:flex; align-items:center; }
        .cart-item img { margin-right:10px; }
        .cart-item div { flex:1; }
        button { margin-right:5px; padding:5px 10px; cursor:pointer; }
        #buy-popup { display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
                     background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; }
        .popup-content { background:white; padding:20px; border-radius:8px; width:300px; position:relative; }
        .popup-content h2 { margin-top:0; }
        .popup-content button { margin-top:10px; }
    </style>
</head>
<body>
    <h1>Your Cart</h1>
    <div id="cart-container"></div>
    <button onclick="localStorage.removeItem('cartItems'); loadCart();">Clear Cart</button>

    <!-- BUY POPUP -->
    <div id="buy-popup">
        <div class="popup-content">
            <h2>Buy Product</h2>
            <div id="buy-details"></div>
            <form id="buy-form">
                <input type="text" name="name" placeholder="Full Name" required><br><br>
                <input type="text" name="address" placeholder="Address" required><br><br>
                <input type="text" name="phone" placeholder="Phone Number" required><br><br>
                <button type="submit">Place Order</button>
                <button type="button" onclick="closeBuyPopup()">Cancel</button>
            </form>
        </div>
    </div>

    <script src="products.js"></script>
    <script src="script.js"></script>
    <script>
        // Override loadCart to include REMOVE button
        function loadCart(){
            const cart = getCart();
            const box = document.getElementById("cart-container");
            box.innerHTML = "";

            if(cart.length === 0){
                box.innerHTML = "<p>Your cart is empty!</p>";
                return;
            }

            let total = 0;
            cart.forEach(item => {
                const div = document.createElement("div");
                div.classList.add("cart-item");
                div.innerHTML = `
                    <img src="${item.img}" width="100" alt="${item.name}">
                    <div>
                        <h3>${item.name}</h3>
                        <p>Price: ₹${item.price}</p>
                        <p>Qty: ${item.qty}</p>
                        <p>Total: ₹${item.price * item.qty}</p>
                        <button onclick="removeFromCart(${item.id})">Remove</button>
                        <button onclick="showBuyDetails(${item.id})">Buy</button>
                    </div>
                `;
                box.appendChild(div);
                total += item.price * item.qty;
            });

            box.innerHTML += `<h3>Total Amount: ₹${total}</h3>`;
        }

        // BUY POPUP
        function showBuyDetails(id){
            const product = products.find(p => p.id === id);
            if(!product) return;

            const popup = document.getElementById("buy-popup");
            const details = document.getElementById("buy-details");
            details.innerHTML = `
                <img src="${product.img}" width="150" alt="${product.name}">
                <p><b>${product.name}</b></p>
                <p>Price: ₹${product.price}</p>
            `;
            popup.style.display = "flex";

            document.getElementById("buy-form").onsubmit = function(e){
                e.preventDefault();
                alert(`Order Successful ✅
Product: ${product.name}
Price: ₹${product.price}
Name: ${this.name.value}
Address: ${this.address.value}
Phone: ${this.phone.value}`);
                closeBuyPopup();
            }
        }

        function closeBuyPopup(){
            const popup = document.getElementById("buy-popup");
            if(popup) popup.style.display = "none";
        }

        // Initial load
        document.addEventListener("DOMContentLoaded", ()=>{ loadCart(); });
    </script>
</body>
</html>
