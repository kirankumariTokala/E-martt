<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-Mart | Categories</title>
<link rel="stylesheet" href="style.css">
<style>
/* ==== SAME AS INDEX.HTML PRODUCTS ==== */
.product-card {
    background: white;
    padding: 15px;
    width: 200px;
    text-align: center;
    border-radius: 8px;
}
.product-card img {
    width: 100%;
    cursor: pointer;
}
button {
    padding: 8px 12px;
    background: green;
    color: white;
    border: none;
    cursor: pointer;
    margin-top: 5px;
}
span.wishlist {
    cursor: pointer;
    color: red;
    font-size: 20px;
}
.product-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}
</style>
</head>
<body>

<header>
    <h1>E-Mart</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="categories.html">Categories</a>
        <a href="cart.html">Cart</a>
        <a href="wishlist.html">Wishlist</a>
    </nav>
</header>

<section>
    <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
</section>

<section class="product-container" id="products">
    <!-- Products will load here dynamically -->
</section>

<script src="products.js"></script>
<script src="script.js"></script>
<script src="categories.js"></script>
</body>
</html>
