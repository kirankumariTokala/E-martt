<div id="product-details"></div>

<script src="products.js"></script>
<script src="script.js"></script>
<script>
const params=new URLSearchParams(window.location.search);
const id=parseInt(params.get("id"));
const product=products.find(p=>p.id===id);
const box=document.getElementById("product-details");

if(!product){ box.innerHTML="<h2>Product Not Found</h2>"; }
else{
  box.innerHTML=`
    <div class="product-details">
      <img src="${product.img}" width="300">
      <h2>${product.name}</h2>
      <p><b>Price:</b> ₹${product.price}</p>
      <p>${product.desc}</p>
      <p><b>Rating:</b> ${product.rating}⭐</p>
      <button onclick="addToCartById(${product.id})">Add to Cart</button>
      <button onclick="addToWishlistById(${product.id})">❤️ Wishlist</button>
      <button onclick="showBuyDetails(${product.id})">Buy</button>
    </div>
  `;
}
</script><hr>

// Load reviews
function loadReviews(){
  const box = document.getElementById("reviews");
  let reviews = JSON.parse(localStorage.getItem("reviews_"+productId))
              || defaultReviews[productId] || [];

  box.innerHTML = "";
  reviews.forEach(r => {
    box.innerHTML += `
      <div class="review">
        <strong>${r.name}</strong>
        <div class="review-stars">${"★".repeat(r.rating)}${"☆".repeat(5-r.rating)}</div>
        <p>${r.comment}</p>
      </div>
    `;
  });
}

// Add review
document.getElementById("reviewForm").onsubmit = function(e){
  e.preventDefault();

  const name = userName.value;
  const rating = Number(userRating.value);
  const comment = userComment.value;

  const key = "reviews_"+productId;
  let reviews = JSON.parse(localStorage.getItem(key)) || [];

  reviews.push({name, rating, comment});
  localStorage.setItem(key, JSON.stringify(reviews));

  this.reset();
  loadReviews();
};
